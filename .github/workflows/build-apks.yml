name: Build Android APKs

on:
  push:
    branches:
      - prod
  pull_request:
    branches:
      - prod

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21 # Updated to JDK 21 for AGP 9.0 and Gradle 9.5
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: 9.5.0

      - name: Create gradle.properties for CI
        run: |
          echo "android.useAndroidX=true" > gradle.properties
          echo "android.nonTransitiveRClass=true" >> gradle.properties

      - name: Build with Gradle
        run: gradle assembleDebug

      - name: Upload IP-RAT APK
        uses: actions/upload-artifact@v4
        with:
          name: ip-rat-debug
          path: ip-rat/build/outputs/apk/debug/ip-rat-debug.apk

      - name: Upload IP-VIEW APK
        uses: actions/upload-artifact@v4
        with:
          name: ip-view-debug
          path: ip-view/build/outputs/apk/debug/ip-view-debug.apk
